<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <title>Controle de Saída</title>
</head>

<body>
    <h1>Controle de Saída</h1>
    <div id="container-formulario">
        <form>
            <div id="menu-do-formulario">
                <div>
                    <label for="inData">Data:</label>
                    <input type="date" name="inData" id="inData">
                </div>
                <div>
                    <label for="inCliente">Cliente/Lugar</label>
                    <input type="text" name="inCliente" id="inCliente">
                </div>
                <div>
                    <label for="inHoraSaida">Horário de Saída</label>
                    <input type="time" name="inHoraSaida" id="inHoraSaida">
                </div>
                <div>
                    <label for="inHoraRetorno">Horário de Retorno</label>
                    <input type="time" name="inHoraRetorno" id="inHoraRetorno">
                </div>
            </div>
        </form>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
